<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入 - 政旭汽車材料行</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    </style>
</head>
<body class="bg-[#F5F0E8] min-h-screen flex items-center justify-center">

<div class="w-full max-w-sm">

    <!-- Logo / 標題 -->
    <div class="text-center mb-8">
        <div class="text-4xl mb-3">🏢</div>
        <h1 class="text-xl font-bold text-gray-800">政旭汽車材料行</h1>
        <p class="text-sm text-gray-400 mt-1">管理後台</p>
    </div>

    <!-- 登入卡片 -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">

        {% if form.errors %}
        <div class="mb-4 px-4 py-3 bg-red-50 border border-red-200 rounded-xl text-sm text-red-600">
            帳號或密碼錯誤，請重試。
        </div>
        {% endif %}

        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">帳號</label>
                <input type="text" name="username" autofocus
                    class="w-full px-3 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-gray-300">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">密碼</label>
                <input type="password" name="password"
                    class="w-full px-3 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-gray-300">
            </div>
            <button type="submit"
                class="w-full py-2.5 bg-gray-900 text-white rounded-xl text-sm font-medium hover:bg-gray-700 transition-colors mt-2">
                登入
            </button>
        </form>
    </div>
</div>

</body>
</html>
