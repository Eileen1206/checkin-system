<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>伺服器錯誤 — 打卡系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { cream: '#F5F0E8' } } }
        }
    </script>
</head>
<body class="bg-cream min-h-screen flex flex-col">
    <nav class="bg-gray-900 px-6 py-3">
        <span class="text-white font-semibold text-lg">政旭汽車材料行</span>
    </nav>
    <main class="flex-1 flex items-center justify-center">
        <div class="text-center">
            <p class="text-8xl font-bold text-gray-200 select-none">500</p>
            <h1 class="mt-4 text-2xl font-semibold text-gray-700">伺服器發生錯誤</h1>
            <p class="mt-2 text-gray-500">系統暫時無法處理請求，請稍後再試。</p>
            <a href="/dashboard/"
               class="mt-6 inline-block px-5 py-2.5 bg-gray-800 text-white rounded-xl text-sm hover:bg-gray-700 transition-colors">
                回到儀表板
            </a>
        </div>
    </main>

</html>
