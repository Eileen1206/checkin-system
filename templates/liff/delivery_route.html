<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>今日送貨路線</title>
  <script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f0e8;
      min-height: 100vh;
    }

    /* ── 頂部 ── */
    .header {
      background: #1a1a1a;
      color: white;
      padding: 20px 20px 16px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-title { font-size: 17px; font-weight: 700; margin-bottom: 12px; }
    .progress-bar-bg {
      background: rgba(255,255,255,0.15);
      border-radius: 99px;
      height: 6px;
      margin-bottom: 8px;
    }
    .progress-bar-fill {
      background: #27ACB2;
      border-radius: 99px;
      height: 6px;
      transition: width 0.4s ease;
    }
    .progress-text { font-size: 13px; color: rgba(255,255,255,0.7); }

    /* ── 站點清單 ── */
    .list { padding: 16px 16px 120px; }

    .stop-card {
      background: white;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 10px;
      border: 2px solid transparent;
      transition: border-color 0.2s, opacity 0.2s;
    }
    .stop-card.done { opacity: 0.55; border-color: #d1fae5; }
    .stop-card.next { border-color: #27ACB2; box-shadow: 0 4px 16px rgba(39,172,178,0.15); }

    .stop-header { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
    .stop-num {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; flex-shrink: 0;
      background: #e5e7eb; color: #555;
    }
    .stop-card.done .stop-num { background: #d1fae5; color: #059669; }
    .stop-card.next .stop-num { background: #27ACB2; color: white; }
    .stop-name { font-size: 15px; font-weight: 600; color: #1a1a1a; }
    .stop-card.done .stop-name { text-decoration: line-through; color: #9ca3af; }
    .stop-addr { font-size: 13px; color: #888; margin-top: 2px; padding-left: 38px; }
    .stop-status { font-size: 12px; color: #27ACB2; margin-left: auto; white-space: nowrap; }

    .arrive-btn {
      display: block; width: 100%; margin-top: 12px; padding: 12px;
      background: #27ACB2; color: white; border: none; border-radius: 12px;
      font-size: 15px; font-weight: 700; cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .arrive-btn:active { transform: scale(0.97); background: #1d8f94; }
    .arrive-btn:disabled { background: #9ca3af; cursor: not-allowed; transform: none; }
    .arrive-btn.loading::after {
      content: '';
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.4); border-top-color: white;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      margin-left: 8px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .msg-box {
      font-size: 13px; padding: 8px 12px; border-radius: 8px; margin-top: 8px; display: none;
    }
    .msg-box.ok   { background: #f0fdf4; color: #166534; display: block; }
    .msg-box.err  { background: #fef2f2; color: #991b1b; display: block; }
    .msg-box.warn { background: #fffbeb; color: #92400e; display: block; }

    /* ── 底部按鈕 ── */
    .footer {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 16px;
      background: rgba(245,240,232,0.95);
      backdrop-filter: blur(6px);
      border-top: 1px solid rgba(0,0,0,0.06);
    }
    .finish-btn {
      width: 100%; padding: 15px;
      background: #1a1a1a; color: white; border: none;
      border-radius: 14px; font-size: 16px; font-weight: 700;
      cursor: pointer; transition: background 0.15s, transform 0.1s;
    }
    .finish-btn:active { transform: scale(0.97); }
    .finish-btn.all-done { background: #059669; }

    /* ── 全螢幕狀態 ── */
    .fullscreen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 32px;
      text-align: center; flex-direction: column;
    }
    .big-icon { font-size: 56px; margin-bottom: 16px; }
    .big-title { font-size: 20px; font-weight: 700; color: #1a1a1a; margin-bottom: 8px; }
    .big-sub   { font-size: 14px; color: #888; line-height: 1.6; }
    .spinner {
      width: 44px; height: 44px;
      border: 3px solid #e5e7eb; border-top-color: #1a1a1a;
      border-radius: 50%; animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }

    /* ── 出發確認畫面 ── */
    .start-screen {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 100vh;
      padding: 32px; text-align: center;
      background: #f5f0e8;
    }
    .start-icon  { font-size: 64px; margin-bottom: 20px; }
    .start-title { font-size: 22px; font-weight: 700; color: #1a1a1a; margin-bottom: 8px; }
    .start-sub   { font-size: 14px; color: #888; margin-bottom: 32px; line-height: 1.6; }
    .start-stops {
      background: white; border-radius: 16px; padding: 16px;
      width: 100%; max-width: 360px; margin-bottom: 28px; text-align: left;
    }
    .start-stops-title { font-size: 12px; color: #aaa; font-weight: 600; margin-bottom: 10px; letter-spacing: .05em; }
    .start-stop-row {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0; border-bottom: 1px solid #f3f4f6;
    }
    .start-stop-row:last-child { border-bottom: none; }
    .start-stop-num {
      width: 24px; height: 24px; border-radius: 50%;
      background: #e5e7eb; color: #555;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; flex-shrink: 0;
    }
    .start-stop-name { font-size: 14px; color: #1a1a1a; font-weight: 500; }
    .depart-btn {
      width: 100%; max-width: 360px;
      padding: 18px; background: #27ACB2; color: white;
      border: none; border-radius: 16px;
      font-size: 18px; font-weight: 700; cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      box-shadow: 0 4px 20px rgba(39,172,178,0.3);
    }
    .depart-btn:active { transform: scale(0.97); background: #1d8f94; }
    .depart-btn:disabled { background: #9ca3af; box-shadow: none; cursor: not-allowed; }

    /* ── 完成確認 Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      display: flex; align-items: flex-end; justify-content: center;
      z-index: 100; padding: 0;
    }
    .modal-overlay.hidden { display: none; }
    .modal-sheet {
      background: white; border-radius: 24px 24px 0 0;
      padding: 28px 24px 40px; width: 100%; max-width: 480px;
    }
    .modal-handle {
      width: 40px; height: 4px; background: #e5e7eb;
      border-radius: 99px; margin: 0 auto 20px;
    }
    .modal-title { font-size: 18px; font-weight: 700; color: #1a1a1a; margin-bottom: 8px; }
    .modal-sub   { font-size: 14px; color: #888; margin-bottom: 20px; line-height: 1.5; }
    .modal-remain {
      background: #fffbeb; border: 1px solid #fde68a;
      border-radius: 12px; padding: 12px 14px; margin-bottom: 20px;
      font-size: 13px; color: #92400e;
    }
    .modal-remain ul { margin: 6px 0 0 16px; }
    .modal-remain li { margin-bottom: 3px; }
    .modal-btn-row { display: flex; gap: 10px; }
    .modal-cancel {
      flex: 1; padding: 14px; background: #f3f4f6; color: #555;
      border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer;
    }
    .modal-confirm {
      flex: 2; padding: 14px; background: #1a1a1a; color: white;
      border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer;
    }
    .modal-confirm.danger { background: #dc2626; }
  </style>
</head>
<body>

<div id="app">
  <div class="fullscreen">
    <div class="spinner"></div>
    <div class="big-title">載入中…</div>
  </div>
</div>

<!-- 回報座標錯誤 Modal -->
<div class="modal-overlay hidden" id="report-modal">
  <div class="modal-sheet">
    <p class="modal-title">📌 回報座標錯誤</p>
    <p style="font-size:13px;color:#666;margin-bottom:12px;">目前 GPS 位置將作為建議新座標送出，待管理員審核後更新。</p>
    <textarea id="report-note" placeholder="備註（可選，例如：正確位置在巷子裡）"
      style="width:100%;border:1px solid #e5e7eb;border-radius:10px;padding:10px;font-size:14px;resize:none;height:72px;box-sizing:border-box;margin-bottom:10px;"></textarea>
    <p id="report-result" style="font-size:13px;min-height:18px;margin-bottom:8px;"></p>
    <input type="hidden" id="report-task-id">
    <input type="hidden" id="report-customer-id">
    <input type="hidden" id="report-lat">
    <input type="hidden" id="report-lng">
    <input type="hidden" id="report-distance">
    <div class="modal-btn-row">
      <button class="modal-cancel" onclick="closeReportModal()">取消</button>
      <button class="modal-confirm" id="report-submit-btn" onclick="submitReport()" style="background:#f59e0b;">送出申請</button>
    </div>
  </div>
</div>

<!-- 完成確認 Modal -->
<div class="modal-overlay hidden" id="finish-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-sub"  id="modal-sub"></div>
    <div class="modal-remain hidden" id="modal-remain"></div>
    <div class="modal-btn-row">
      <button class="modal-cancel" onclick="closeModal()">取消</button>
      <button class="modal-confirm" id="modal-confirm-btn" onclick="doFinish()">確認結束</button>
    </div>
  </div>
</div>

<script>
const LIFF_ID    = "{{ liff_route_id }}";
const API_TASKS  = "/liff/delivery/tasks/";
const API_START  = "/liff/delivery/start/";
const API_DONE   = "/liff/delivery/complete/";
const API_FINISH = "/liff/delivery/finish/";

let lineUserId      = null;
let tasks           = [];
let sessionId       = null;
let pollingInterval = null;   // 輪詢計時器
let isArriving      = false;  // 正在執行到達確認時暫停刷新

/* ────────── 主流程 ────────── */
async function main() {
  await liff.init({ liffId: LIFF_ID });
  if (!liff.isLoggedIn()) { liff.login(); return; }

  const profile = await liff.getProfile();
  lineUserId = profile.userId;

  const res  = await fetch(`${API_TASKS}?line_user_id=${lineUserId}`);
  const data = await res.json();

  if (!data.ok) { showFull('❌', '載入失敗', data.error); return; }
  if (!data.tasks.length) { showFull('📦', '今日無任務', '尚未安排送貨路線'); return; }

  tasks     = data.tasks;
  sessionId = data.session_id;

  // 若趟次尚未出發 → 顯示出發確認畫面
  if (!data.started) {
    showStartScreen();
  } else {
    renderPage();
    startPolling();
  }
}

/* ────────── 輪詢：每 15 秒靜默更新 ────────── */
function startPolling() {
  if (pollingInterval) return;
  pollingInterval = setInterval(refreshTasks, 15000);
}
function stopPolling() {
  if (pollingInterval) { clearInterval(pollingInterval); pollingInterval = null; }
}
async function refreshTasks() {
  if (isArriving || !lineUserId) return;
  try {
    const res  = await fetch(`${API_TASKS}?line_user_id=${lineUserId}`);
    const data = await res.json();
    if (!data.ok || !data.tasks.length) return;
    // 只有任務數量或狀態有變化時才重新渲染（避免閃爍）
    const newJson = JSON.stringify(data.tasks.map(t => ({ id: t.id, status: t.status })));
    const oldJson = JSON.stringify(tasks.map(t => ({ id: t.id, status: t.status })));
    if (newJson !== oldJson) {
      tasks     = data.tasks;
      sessionId = data.session_id;
      renderPage();
    }
  } catch (e) { /* 靜默失敗，下次再試 */ }
}

/* ────────── 出發確認畫面 ────────── */
function showStartScreen() {
  const stopRows = tasks.map(t => `
    <div class="start-stop-row">
      <div class="start-stop-num">${t.order}</div>
      <div class="start-stop-name">${t.customer_name}</div>
    </div>`).join('');

  document.getElementById('app').innerHTML = `
    <div class="start-screen">
      <div class="start-icon">🚚</div>
      <div class="start-title">今日共 ${tasks.length} 站</div>
      <div class="start-sub">確認路線後，按下出發開始計時</div>
      <div class="start-stops">
        <div class="start-stops-title">TODAY'S ROUTE</div>
        ${stopRows}
      </div>
      <button class="depart-btn" id="depart-btn" onclick="depart()">🚀 出發！</button>
    </div>`;
}

async function depart() {
  const btn = document.getElementById('depart-btn');
  btn.disabled = true;
  btn.textContent = '記錄出發時間…';

  try {
    await fetch(API_START, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sessionId, line_user_id: lineUserId }),
    });
  } catch (e) { /* 即使失敗也繼續，避免卡住 */ }

  renderPage();
}

/* ────────── 渲染送貨路線頁 ────────── */
function renderPage() {
  const done  = tasks.filter(t => t.status === 'completed').length;
  const total = tasks.length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  const allDone = done === total;

  document.getElementById('app').innerHTML = `
    <div class="header">
      <div class="header-title">🚚 今日送貨路線</div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" style="width:${pct}%"></div>
      </div>
      <div class="progress-text">${done} / ${total} 站完成</div>
    </div>

    <div class="list" id="stop-list">
      ${tasks.map(t => renderStop(t)).join('')}
    </div>

    <div class="footer">
      <button class="finish-btn ${allDone ? 'all-done' : ''}" onclick="confirmFinish()">
        ${allDone ? '✅ 已全部完成・結束運送' : '🏠 完成本次運送'}
      </button>
    </div>`;
}

function renderStop(task) {
  const isDone   = task.status === 'completed';
  const nextTask = tasks.find(t => t.status !== 'completed');
  const isNext   = nextTask && nextTask.id === task.id;   // 建議下一站（僅做視覺提示）
  const cls = isDone ? 'done' : isNext ? 'next' : '';

  return `
  <div class="stop-card ${cls}" id="card-${task.id}">
    <div class="stop-header">
      <div class="stop-num">${isDone ? '✓' : task.order}</div>
      <div class="stop-name">${task.customer_name}</div>
      ${isDone ? '<span class="stop-status">已完成</span>' : ''}
      ${isNext && !isDone ? '<span class="stop-status">建議下一站</span>' : ''}
    </div>
    <div class="stop-addr">📍 ${task.address}</div>
    ${!isDone ? `
      <button class="arrive-btn" id="btn-${task.id}" onclick="arrive(${task.id})">
        📍 到達確認
      </button>
      <div class="msg-box" id="msg-${task.id}"></div>
    ` : ''}
  </div>`;
}

/* ────────── 到達確認 ────────── */
async function arrive(taskId) {
  isArriving = true;  // 暫停輪詢，避免操作中被刷新覆蓋
  const btn = document.getElementById(`btn-${taskId}`);
  const msg = document.getElementById(`msg-${taskId}`);

  btn.disabled = true;
  btn.classList.add('loading');
  btn.textContent = '定位中';
  msg.className = 'msg-box';

  let lat = null, lng = null;
  try {
    const pos = await new Promise((resolve, reject) =>
      navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 8000 })
    );
    lat = pos.coords.latitude;
    lng = pos.coords.longitude;
  } catch (e) {
    btn.classList.remove('loading');
    btn.disabled = false;
    btn.textContent = '📍 到達確認';
    msg.className = 'msg-box warn';
    msg.textContent = '⚠️ 無法取得 GPS，請確認已開啟位置權限';
    return;
  }

  try {
    const res  = await fetch(API_DONE, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ task_id: taskId, lat, lng, line_user_id: lineUserId }),
    });
    const data = await res.json();

    if (data.ok) {
      const t = tasks.find(t => t.id === taskId);
      if (t) t.status = 'completed';
      isArriving = false;
      renderPage();
    } else {
      isArriving = false;
      btn.classList.remove('loading');
      btn.disabled = false;
      btn.textContent = '📍 到達確認';
      msg.className = 'msg-box err';
      msg.innerHTML = data.error;
      // 距離過遠時顯示「回報座標錯誤」按鈕
      if (data.too_far) {
        const reportBtn = document.createElement('button');
        reportBtn.textContent = '📌 回報座標錯誤';
        reportBtn.style.cssText = 'display:block;width:100%;margin-top:8px;padding:9px;background:#f59e0b;color:white;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;';
        reportBtn.onclick = () => openReportModal(taskId, data.customer_id, lat, lng, data.distance);
        msg.appendChild(reportBtn);
      }
    }
  } catch (e) {
    isArriving = false;
    btn.classList.remove('loading');
    btn.disabled = false;
    btn.textContent = '📍 到達確認';
    msg.className = 'msg-box err';
    msg.textContent = '網路錯誤，請稍後再試';
  }
}

/* ────────── 回報座標錯誤 ────────── */
function openReportModal(taskId, customerId, lat, lng, distance) {
  document.getElementById('report-task-id').value   = taskId;
  document.getElementById('report-customer-id').value = customerId;
  document.getElementById('report-lat').value       = lat;
  document.getElementById('report-lng').value       = lng;
  document.getElementById('report-distance').value  = distance;
  document.getElementById('report-note').value      = '';
  document.getElementById('report-result').textContent = '';
  document.getElementById('report-modal').classList.remove('hidden');
}

function closeReportModal() {
  document.getElementById('report-modal').classList.add('hidden');
}

async function submitReport() {
  const btn = document.getElementById('report-submit-btn');
  btn.disabled = true;
  btn.textContent = '送出中…';
  const form = new FormData();
  form.append('line_user_id',  lineUserId);
  form.append('customer_id',   document.getElementById('report-customer-id').value);
  form.append('lat',           document.getElementById('report-lat').value);
  form.append('lng',           document.getElementById('report-lng').value);
  form.append('distance',      document.getElementById('report-distance').value);
  form.append('note',          document.getElementById('report-note').value);
  try {
    const res  = await fetch('/liff/delivery/report-location/', { method: 'POST', body: form });
    const data = await res.json();
    const result = document.getElementById('report-result');
    if (data.ok) {
      result.style.color = '#16a34a';
      result.textContent = '✅ ' + data.message;
      setTimeout(closeReportModal, 1800);
    } else {
      result.style.color = '#dc2626';
      result.textContent = '❌ ' + data.error;
      btn.disabled = false;
      btn.textContent = '送出申請';
    }
  } catch (e) {
    btn.disabled = false;
    btn.textContent = '送出申請';
  }
}

/* ────────── 完成確認 Modal ────────── */
function confirmFinish() {
  const remaining = tasks.filter(t => t.status !== 'completed');
  const done      = tasks.length - remaining.length;

  const modal      = document.getElementById('finish-modal');
  const title      = document.getElementById('modal-title');
  const sub        = document.getElementById('modal-sub');
  const remainDiv  = document.getElementById('modal-remain');
  const confirmBtn = document.getElementById('modal-confirm-btn');

  if (remaining.length === 0) {
    title.textContent = '結束本次運送';
    sub.textContent   = `全部 ${done} 站已完成，確認結束？`;
    remainDiv.classList.add('hidden');
    confirmBtn.className = 'modal-confirm';
    confirmBtn.textContent = '✅ 確認結束';
  } else {
    title.textContent = '尚有未完成的站';
    sub.textContent   = `已完成 ${done} / ${tasks.length} 站，仍有 ${remaining.length} 站未送達，確定要結束本次運送嗎？`;
    remainDiv.innerHTML = `<strong>未完成站點：</strong><ul>` +
      remaining.map(t => `<li>第 ${t.order} 站｜${t.customer_name}</li>`).join('') +
      `</ul>`;
    remainDiv.classList.remove('hidden');
    confirmBtn.className = 'modal-confirm danger';
    confirmBtn.textContent = '強制結束';
  }

  modal.classList.remove('hidden');
}

function closeModal() {
  document.getElementById('finish-modal').classList.add('hidden');
}

/* ────────── 執行完成 ────────── */
async function doFinish() {
  closeModal();
  stopPolling();  // 結束後不再輪詢

  try {
    const today = new Date().toISOString().slice(0, 10);
    const res   = await fetch(API_FINISH, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sessionId, line_user_id: lineUserId, date: today }),
    });
    const data = await res.json();

    const done  = tasks.filter(t => t.status === 'completed').length;
    const total = tasks.length;
    const mins  = data.duration ? `（共 ${data.duration} 分鐘）` : '';

    document.getElementById('app').innerHTML = `
      <div class="fullscreen">
        <div class="big-icon">🎉</div>
        <div class="big-title">本次運送完成！</div>
        <div class="big-sub">${done} / ${total} 站完成 ${mins}</div>
        <button onclick="liff.closeWindow()"
          style="margin-top:32px; padding:14px 36px; background:#1a1a1a; color:white;
                 border:none; border-radius:14px; font-size:16px; font-weight:700; cursor:pointer;">
          關閉
        </button>
      </div>`;
  } catch (e) {
    liff.closeWindow();
  }
}

/* ────────── 全螢幕提示 ────────── */
function showFull(icon, title, sub) {
  document.getElementById('app').innerHTML = `
    <div class="fullscreen">
      <div class="big-icon">${icon}</div>
      <div class="big-title">${title}</div>
      <div class="big-sub">${sub}</div>
    </div>`;
}

main().catch(e => showFull('❌', '發生錯誤', e.message));
</script>
</body>
</html>
