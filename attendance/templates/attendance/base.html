<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}打卡系統{% endblock %}</title>
    <!-- Bootstrap 5：提供現成的樣式，不用自己寫 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- 上方導覽列 -->
    <nav class="navbar navbar-dark bg-dark px-4">
        <span class="navbar-brand">🏢 員工打卡系統</span>
        {% if request.user.is_authenticated %}
        <div class="d-flex align-items-center gap-3">
            <a href="{% url 'dashboard:index' %}" class="text-white text-decoration-none">儀表板</a>
            <a href="{% url 'dashboard:binding_list' %}" class="text-white text-decoration-none">LINE 綁定</a>
            <a href="{% url 'dashboard:import_customers' %}" class="text-white text-decoration-none">匯入客戶</a>
            <span class="text-white">
                {{ request.user.get_full_name|default:request.user.username }}
                &nbsp;|&nbsp;
                <a href="{% url 'logout' %}" class="text-white">登出</a>
            </span>
        </div>
        {% endif %}
    </nav>

    <!-- 主要內容區塊（子頁面填入這裡） -->
    <div class="container py-4">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
