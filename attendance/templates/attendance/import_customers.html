{% extends "attendance/base.html" %}
{% block title %}匯入客戶資料{% endblock %}
{% block content %}

<div class="max-w-lg">

  <!-- 標題 -->
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold text-gray-800">匯入客戶 CSV</h1>
    <a href="{% url 'dashboard:index' %}" class="px-4 py-2 border border-gray-300 text-gray-600 rounded-xl text-sm hover:bg-gray-50">← 回儀表板</a>
  </div>

  <!-- 說明卡片 -->
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
    <p class="text-sm text-gray-500 mb-4">
      請上傳從系統匯出的 CSV 檔案，格式需包含以下欄位：<br>
      <code class="mt-1 inline-block bg-gray-100 px-2 py-1 rounded text-xs text-gray-700">客戶編號　客戶名稱　地址　電話號碼</code>
    </p>

    <form method="post" enctype="multipart/form-data" class="space-y-4">
      {% csrf_token %}
      <div>
        <label class="block text-xs font-semibold text-gray-600 mb-1">選擇 CSV 檔案</label>
        <input type="file" name="csv_file" accept=".csv,.txt"
          class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm text-gray-600 file:mr-3 file:py-1 file:px-3 file:rounded-lg file:border-0 file:text-xs file:font-medium file:bg-gray-100 file:text-gray-700 hover:file:bg-gray-200 focus:outline-none focus:ring-2 focus:ring-gray-300">
      </div>
      <button type="submit" class="w-full px-4 py-2 bg-gray-900 text-white rounded-xl text-sm hover:bg-gray-700">匯入</button>
    </form>
  </div>

</div>
{% endblock %}
