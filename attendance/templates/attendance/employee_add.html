{% extends "attendance/base.html" %}
{% block title %}新增員工{% endblock %}
{% block content %}

<div class="flex items-center justify-between mb-6">
  <h1 class="text-2xl font-bold text-gray-800">新增員工</h1>
  <a href="{% url 'dashboard:employee_list' %}" class="text-sm text-gray-500 hover:underline">← 返回列表</a>
</div>

<div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 max-w-2xl">
  <form method="post">
    {% csrf_token %}

    <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-3">帳號資訊</p>

    <!-- 是否需要登入系統 -->
    <div class="mb-4 p-3 bg-gray-50 rounded-xl flex items-start gap-3">
      <input type="checkbox" name="need_login" id="id_need_login" class="w-4 h-4 rounded mt-0.5" checked>
      <div>
        <label for="id_need_login" class="text-sm font-medium text-gray-700 cursor-pointer">需要登入管理系統</label>
        <p class="text-xs text-gray-400 mt-0.5">只使用 LINE 打卡的員工不需要勾選，帳號會自動設為無法登入</p>
      </div>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-6">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">帳號（登入用）</label>
        <input type="text" name="username" required class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-gray-300">
      </div>
      <div id="password_field">
        <label class="block text-sm font-medium text-gray-700 mb-1">密碼</label>
        <input type="password" name="password" id="id_password" class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-gray-300">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">姓</label>
        <input type="text" name="last_name" class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-gray-300">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">名</label>
        <input type="text" name="first_name" class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-gray-300">
      </div>
    </div>

    <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-3">員工資料</p>
    <div class="grid grid-cols-2 gap-4 mb-6">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">工號</label>
        <input type="text" name="employee_id" required class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-gray-300">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">部門</label>
        <input type="text" name="department" class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-gray-300">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">薪資類型</label>
        <select name="employment_type" class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-gray-300 bg-white">
          <option value="monthly">月薪制</option>
          <option value="hourly">時薪制</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">月薪（月薪制填）</label>
        <input type="number" name="monthly_salary" min="0" step="1"
          class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-gray-300">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">時薪（時薪制填）</label>
        <input type="number" name="hourly_rate" min="0" step="0.01"
          class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-gray-300">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">上班時間</label>
        <input type="time" name="work_start_time" id="id_work_start_time"
          class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-gray-300">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">下班時間</label>
        <input type="time" name="work_end_time" id="id_work_end_time"
          class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-gray-300">
        <p id="time_error" class="text-xs text-red-500 mt-1 hidden">下班時間必須晚於上班時間</p>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">每日油費補貼</label>
        <input type="number" name="fuel_daily_allowance" value="0" min="0" step="1"
          class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-gray-300">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">勞保自負月額</label>
        <input type="number" name="labor_insurance_amount" min="0" step="1"
          class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-gray-300">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">健保自負月額</label>
        <input type="number" name="health_insurance_amount" min="0" step="1"
          class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-gray-300">
      </div>
    </div>

    <div class="mb-6">
      <label class="flex items-center gap-2 cursor-pointer">
        <input type="checkbox" name="is_delivery" class="w-4 h-4 rounded">
        <span class="text-sm font-medium text-gray-700">是送貨員</span>
      </label>
    </div>

    <button type="submit" class="px-6 py-2.5 bg-gray-900 text-white rounded-xl text-sm font-medium hover:bg-gray-700">
      新增員工
    </button>
  </form>
</div>

{% endblock %}

{% block extra_scripts %}
<script>
  function validateTimes() {
    const start = document.getElementById('id_work_start_time').value;
    const end   = document.getElementById('id_work_end_time').value;
    const err   = document.getElementById('time_error');
    if (start && end && end <= start) {
      err.classList.remove('hidden');
      document.getElementById('id_work_end_time').setCustomValidity('下班時間必須晚於上班時間');
      return false;
    }
    err.classList.add('hidden');
    document.getElementById('id_work_end_time').setCustomValidity('');
    return true;
  }
  document.getElementById('id_work_start_time').addEventListener('change', validateTimes);
  document.getElementById('id_work_end_time').addEventListener('change', validateTimes);
  document.querySelector('form').addEventListener('submit', e => { if (!validateTimes()) e.preventDefault(); });

  // 切換密碼欄位顯示
  const needLogin = document.getElementById('id_need_login');
  const pwField   = document.getElementById('password_field');
  const pwInput   = document.getElementById('id_password');
  function togglePassword() {
    if (needLogin.checked) {
      pwField.style.display = '';
      pwInput.required = true;
    } else {
      pwField.style.display = 'none';
      pwInput.required = false;
      pwInput.value = '';
    }
  }
  needLogin.addEventListener('change', togglePassword);
  togglePassword(); // 初始化
</script>
{% endblock %}
