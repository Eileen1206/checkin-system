{% extends "attendance/base.html" %}
{% block title %}客戶分析{% endblock %}
{% block page_title %}🏪 客戶分析{% endblock %}

{% block extra_head %}
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
{% endblock %}

{% block content %}
<div class="space-y-6">

  <!-- 本月 Top 15 送貨頻率 -->
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
    <h2 class="text-sm font-semibold text-gray-700 mb-4">🏆 本月送貨頻率 Top 15 客戶</h2>
    <div class="relative h-96">
      <canvas id="chartTopCustomers"></canvas>
    </div>
  </div>

  <!-- Top 5 客戶近 3 個月趨勢 -->
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
    <h2 class="text-sm font-semibold text-gray-700 mb-4">📈 Top 5 客戶近 3 個月送貨趨勢</h2>
    <div class="relative h-72">
      <canvas id="chartTrend"></canvas>
    </div>
  </div>

</div>
{% endblock %}

{% block extra_scripts %}
<script>
const custLabels    = {{ cust_labels|safe }};
const custCounts    = {{ cust_counts|safe }};
const monthLabels   = {{ month_labels|safe }};
const trendDatasets = {{ trend_datasets|safe }};

// Top 15 水平長條
new Chart(document.getElementById('chartTopCustomers'), {
  type: 'bar',
  data: {
    labels: custLabels,
    datasets: [{
      label: '送貨次數',
      data: custCounts,
      backgroundColor: '#3b82f6',
      borderRadius: 6,
    }],
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    indexAxis: 'y',
    plugins: { legend: { display: false } },
    scales: { x: { beginAtZero: true, ticks: { stepSize: 1 } } },
  },
});

// Top 5 趨勢折線
new Chart(document.getElementById('chartTrend'), {
  type: 'line',
  data: {
    labels: monthLabels,
    datasets: trendDatasets,
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: { legend: { position: 'top' } },
    scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } },
  },
});
</script>
{% endblock %}
